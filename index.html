<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRM Node Hierarchy Analyzer</title>
    <style>
        :root { --bg: #f8fafc; --surface: #ffffff; --primary: #3b82f6; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h1 { margin-top: 0; font-size: 1.5rem; color: #0f172a; }
        textarea { width: 100%; height: 120px; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 14px; margin-bottom: 1rem; box-sizing: border-box; resize: vertical; }
        button { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .error { color: #ef4444; margin-top: 1rem; font-weight: 500; }
        .response-section { margin-top: 2rem; display: none; }
        .card { border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background: #fdfdfd; }
        .card h3 { margin: 0 0 0.5rem 0; font-size: 1.1rem; color: var(--primary); }
        pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .stat-box { background: #f1f5f9; padding: 1rem; border-radius: 6px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Node Hierarchy Analyzer</h1>
        <p>Enter your JSON array of nodes below[cite: 118]:</p>
        <textarea id="jsonInput">[
  "A->B", "A->C", "B->D", "C->E", "E->F",
  "X->Y", "Y->Z", "Z->X",
  "P->Q", "P->R",
  "G->H", "G->R", "G->I", "G->H",
  "hello", "1->2", "A->"
]</textarea>
        <button onclick="processData()">Analyze Nodes</button>
        <div id="errorMsg" class="error"></div>

        <div id="results" class="response-section">
            <h2>Analysis Summary</h2>
            <div class="grid" id="summaryGrid"></div>
            
            <h2>Hierarchies</h2>
            <div id="hierarchiesList"></div>

            <div class="grid">
                <div class="card">
                    <h3>Invalid Entries</h3>
                    <pre id="invalidEntries"></pre>
                </div>
                <div class="card">
                    <h3>Duplicate Edges</h3>
                    <pre id="duplicateEdges"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update this URL to your deployed API URL once hosted [cite: 136]
        const API_URL = 'http://localhost:3000/bfhl';

        async function processData() {
            const input = document.getElementById('jsonInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const results = document.getElementById('results');
            
            errorMsg.textContent = '';
            results.style.display = 'none';

            let parsedData;
            try {
                parsedData = JSON.parse(input);
            } catch (e) {
                errorMsg.textContent = 'Invalid JSON format. Please ensure it is a valid array of strings.';
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: parsedData })
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                
                const data = await response.json();
                renderUI(data);
            } catch (err) {
                errorMsg.textContent = 'Failed to connect to API. Ensure the backend is running and CORS is enabled. Details: ' + err.message; [cite: 122]
            }
        }

        function renderUI(data) {
            document.getElementById('results').style.display = 'block';

            // Render Summary
            document.getElementById('summaryGrid').innerHTML = `
                <div class="stat-box"><strong>Total Trees:</strong> ${data.summary.total_trees}</div>
                <div class="stat-box"><strong>Total Cycles:</strong> ${data.summary.total_cycles}</div>
                <div class="stat-box"><strong>Largest Root:</strong> ${data.summary.largest_tree_root || 'N/A'}</div>
            `;

            // Render Hierarchies (Pretty printed trees)
            const hierarchiesHtml = data.hierarchies.map((h, i) => `
                <div class="card">
                    <h3>Tree ${i + 1} (Root: ${h.root})</h3>
                    <p style="font-size:13px; color:#64748b; margin-top:0;">
                        ${h.has_cycle ? 'Cycle Detected ⚠️' : `Depth: ${h.depth}`}
                    </p>
                    <pre>${JSON.stringify(h.tree, null, 2)}</pre>
                </div>
            `).join('');
            document.getElementById('hierarchiesList').innerHTML = hierarchiesHtml;

            // Render arrays
            document.getElementById('invalidEntries').textContent = JSON.stringify(data.invalid_entries, null, 2);
            document.getElementById('duplicateEdges').textContent = JSON.stringify(data.duplicate_edges, null, 2);
        }
    </script>
</body>
</html>
